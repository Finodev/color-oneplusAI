<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- Блокируем зум, чтобы ощущалось как натив -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ColorOS 15 - Web Edition</title>
  <link rel="stylesheet" href="style.css">
  <!-- Подключаем нормальные иконки вместо смайликов -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="phone">
    <!-- Dynamic Island -->
    <div id="dynamic-island">
      <i data-lucide="mic" class="island-icon"></i>
      <span class="island-text">00:05</span>
    </div>

    <!-- Экран блокировки -->
    <section id="lockscreen" class="screen active">
      <div class="clock-large" id="lock-time">12:00</div>
      <div class="fingerprint" onclick="unlock()">
        <i data-lucide="fingerprint" class="fp-icon"></i>
      </div>
    </section>

    <!-- Рабочий стол -->
    <section id="homescreen" class="screen">
      <div class="status-bar">
        <div class="time-small" id="status-time">12:00</div>
        <div class="icons">
          <i data-lucide="wifi"></i>
          <i data-lucide="battery-full"></i>
        </div>
      </div>
      
      <div class="app-grid">
        <div class="app-icon" onclick="openApp('calc')">
          <div class="icon-bg" style="background: #ff5722;"><i data-lucide="calculator"></i></div>
          <span>Калькулятор</span>
        </div>
        <div class="app-icon" onclick="openApp('settings')">
          <div class="icon-bg" style="background: #607d8b;"><i data-lucide="settings"></i></div>
          <span>Настройки</span>
        </div>
        <div class="app-icon" onclick="openApp('music')">
          <div class="icon-bg" style="background: #e91e63;"><i data-lucide="music"></i></div>
          <span>Музыка</span>
        </div>
      </div>
      
      <div class="home-indicator" onclick="goHome()"></div>
    </section>

    <!-- ПРИЛОЖЕНИЯ -->

    <!-- Калькулятор -->
    <div id="app-calc" class="app-window">
      <div class="app-header">Калькулятор</div>
      <div class="calc-display" id="calc-display">0</div>
      <div class="calc-grid">
        <button onclick="calcPress('1')">1</button>
        <button onclick="calcPress('+')">+</button>
        <button onclick="calcPress('=')" class="accent">=</button>
        <button onclick="calcClear()">C</button>
      </div>
    </div>

    <!-- Настройки -->
    <div id="app-settings" class="app-window">
      <div class="app-header">Настройки системы</div>
      <div class="setting-item">
        <span>Скорость анимаций</span>
        <select id="anim-speed" onchange="changeSpeed()">
          <option value="0.2s">Быстрые (OriginOS Style)</option>
          <option value="0.5s" selected>Плавные (ColorOS)</option>
          <option value="0.0s">Без анимаций</option>
        </select>
      </div>
      <button class="trigger-btn" onclick="triggerIsland()">Тест Dynamic Island</button>
    </div>

    <!-- Музыка (Доп. приложение) -->
    <div id="app-music" class="app-window">
      <div class="app-header">Плеер</div>
      <div class="music-card">
        <div class="cover"></div>
        <h2>Jump, Bitch</h2>
        <p>Nikolay Mamaev</p>
        <div class="controls">
          <i data-lucide="skip-back"></i>
          <i data-lucide="play-circle" style="width: 48px; height: 48px;"></i>
          <i data-lucide="skip-forward"></i>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
